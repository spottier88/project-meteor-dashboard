name: Docker Image CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Étape 1 : Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 : Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Étape 3 : Resynchroniser le lock file si nécessaire
      - name: Sync package-lock.json
        run: npm install --legacy-peer-deps --package-lock-only

      # Étape 4 : Définir une variable pour le tag
      - name: Set dynamic tag
        run: echo "TAG=$(date +%s)" >> $GITHUB_ENV

      # Étape 5 : Se connecter à Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Étape 6 : Construire l'image Docker
      - name: Build the Docker image
        run: docker build --file Dockerfile --build-arg ENV=docker --tag ${{ secrets.DOCKER_USERNAME }}/project-meteor:latest .

      # Étape 7 : Vérification des images Docker locales
      - name: List Docker Images
        run: docker images

      # Étape 8 : Pousser l'image (latest) vers Docker Hub
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/project-meteor:latest

      # Étape 9 : Taguer l'image avec la version dynamique
      - name: Tag with version
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/project-meteor:latest \
                     ${{ secrets.DOCKER_USERNAME }}/project-meteor:${{ env.TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/project-meteor:${{ env.TAG }}
